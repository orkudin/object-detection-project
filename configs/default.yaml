pipeline:
  name: "runway_patrol_v1"
  log_level: "INFO" 
  telemetry_format: "jsonl" 

detector:
  model_type: "yolo11"    
  weights_path: "yolo11s.pt" # Авто-скачается из интернета у проверяющего
  device: "cuda:0"        
  confidence_threshold: 0.35
  iou_threshold: 0.45
  classes_of_interest: [0, 2, 3, 5, 7] # 0: person, 2: car, 3: motorcycle, 5: bus, 7: truck

tracker:
  algorithm: "bytetrack"
  track_high_thresh: 0.5
  track_low_thresh: 0.1
  new_track_thresh: 0.6
  track_buffer: 30        
  match_thresh: 0.8       

planner:
  mode: "adaptive"          
  grid_step_meters: 10
  coverage_area: [0, 0, 100, 100] 
  safe_altitude: 50       
  priority_weights:
    frequent_detection: 1.5
    time_since_last_visit: 1.2
