pipeline:
  name: "runway_patrol_v1"
  log_level: "INFO" 
  telemetry_format: "jsonl" 
  source_video: "data/test_airport.mp4"
  output_video: "data/output/result.mp4"
  mode: "full"

ui:
  server_port: 7860
  share: false
  show_osd_default: true
  show_target_wp_default: true


detector:
  model_type: "yolo11"    
  weights_path: "yolo11s.pt" # Авто-скачается из интернета у проверяющего
  device: "cuda:0"        
  confidence_threshold: 0.35
  iou_threshold: 0.45
  
  # Спецификация интересующих классов.
  # Если указано null, детектор ищет все доступные классы (80 классов COCO).
  # Пример настройки на определенные классы: [0, 2, 7] (0 - человек, 2 - легковое авто, 7 - грузовик)
  classes_of_interest: null 
  
  # Оптимизация (Регион интереса).
  # Полигон (трапеция), обозначающий ВПП в относительных долях (от 0.0 до 1.0).
  # Объекты вне этого полигона отсекаются аппаратно (экономит ресурсы трекера).
  # Пример установки на весь экран (отключение фильтрации): [[0.0, 0.0], [1.0, 0.0], [1.0, 1.0], [0.0, 1.0]]
  runway_roi: [[0.0, 0.0], [1.0, 0.0], [1.0, 1.0], [0.0, 1.0]] 
tracker:
  algorithm: "bytetrack"
  track_high_thresh: 0.5
  track_low_thresh: 0.1
  new_track_thresh: 0.6
  track_buffer: 30        
  match_thresh: 0.8       

planner:
  mode: "adaptive"          
  grid_step_meters: 10
  coverage_area: [0, 0, 100, 100] 
  safe_altitude: 50       
  priority_weights:
    frequent_detection: 1.5
    time_since_last_visit: 1.2
